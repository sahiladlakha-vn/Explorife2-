name: explorife
description: A travel explorer app to discover destinations, maps, and experiences.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_maps_flutter: ^2.5.0
  flutter_map: ^6.1.0       # offline-friendly map alternative
  latlong2: ^0.9.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  go_router: ^13.0.0
  provider: ^6.1.1
  http: ^1.2.0
  geolocator: ^11.0.0
  flutter_rating_bar: ^4.0.1
  intl: ^0.19.0
  google_fonts: ^6.2.1
  supabase_flutter: ^2.8.0
  flutter_secure_storage: ^9.2.2
  flutter_dotenv: ^5.2.1
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env
